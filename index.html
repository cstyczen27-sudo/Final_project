<!DOCTYPE html>
<html>
    <head>
        <title>Adrian College Life</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
        <link rel="stylesheet" href="css/final_style.css">
    </head>
    <body>
        <div class="rectangle">
            <img src="Images/ISTFTOACW.svg" alt="Adrian College logo">
            <button id="barbtn" class="btn btn-dark">Admin</button>
        </div>

        <div class="pagebtn">
            <a href="index.html"class="btn btn-dark">Campus Event</a>
            <a href="calendar.html" class="btn btn-dark">Calendar</a>
            <a href="map.html" class="btn btn-dark">Campus Map</a>
        </div>

        <div>
            <p>wait there was nothing here</p>
            <br><br>
        </div>

        <div class="row justify-content-center">
            <div  class="col-10">
                <div class="d-flex gap-2 align-items-center">
                    <button id="createBtn">+ Create Event</button>

                    <select id="filter" class="form-control" style="width: 150px;">
                        <option value="">Filter</option>
                            <option value="Fraternity">Fraternity</option>
                            <option value="Sorority">Sorority</option>
                            <option value="Club">Club</option>
                            <option value="Sport Team">Sports Team</option>
                            <option value="Academic">Academic</option>
                            <option value="Social">Social</option>
                            <option value="Savedevents">Saved</option>
                    </select>
                </div>
                <div id="Eventcreate" class="card">
                    <div class="card-body p-4">
                        <form id="EventForm">
                            <input type="text" id="EventTitle" class="form-control" placeholder="Title of Event"><br>
                            <input type="text" id="location" class="form-control" placeholder="Location Address"><br>
                            <select id="category" class="form-control">
                                <option value="">Pick a type of Event</option>
                                <option value="Fraternity">Fraternity</option>
                                <option value="Sorority">Sorority</option>
                                <option value="Club">Club</option>
                                <option value="Sport Team">Sports Team</option>
                                <option value="Academic">Academic</option>
                                <option value="Social">Social</option>
                                <option value="Other">Other</option>
                            </select><br>
                            <textarea id="description" class="form-control" placeholder="Description of event"></textarea><br>
                            <label for="Eventdate">When is the Event</label><br><input type="date" id="Eventdate">
                            <input type="time" id="Eventtime"><br>
                            <input type="radio" name="eventState" id="indoor" value="indoor">
                            <label for="indoor">Indoor</label>

                            <input type="radio" name="eventState" id="outdoor" value="outdoor">
                            <label for="outdoor">Outdoor</label>
                            <br>
                            <button id="submit-btn">Submit</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="eventsList"></div>
        <script src="Javascript/Admin.js"></script>
    </body>
</html>
